name: Sync Allergy Sheet

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-allergy-sheet
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Sync Google Sheet to CSV
        env:
          GOOGLE_SHEET_ID: 1HhvwiexhZaeKFmyk-AFm_sEHEfJ0MifYJaDSRCdME-w
          GOOGLE_SHEET_GID: 0
          OUTPUT_PATH: data/allergy.csv
        run: node scripts/sync-google-sheet.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- data/allergy.csv; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/allergy.csv
          git commit -m "Sync allergy data from Google Sheets"
          git push
